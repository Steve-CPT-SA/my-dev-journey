<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Crawling Gecko</title>
</head>
    <body>
        <div class="gecko">
            
            <div class="gecko-front-left-leg">
                <div class="front-left-upperarm">
                    <div class="front-left-forearm">
                        <div class="front-left-hand"></div>  
                    </div> 
                </div>
            </div>

            <div class="gecko-front-right-leg">
                <div class="front-right-upperarm">
                    <div class="front-right-forearm">
                        <div class="front-right-hand"></div>
                    </div>
                </div>
            </div>

            <div class="gecko-back-left-leg">
                <div class="back-left-upperarm">
                    <div class="back-left-forearm">
                        <div class="back-left-hand"></div>
                    </div>
                </div>
            </div>

            <div class="gecko-back-right-leg">
                <div class="back-right-upperarm">
                    <div class="back-right-forearm">
                        <div class="back-right-hand"></div>
                    </div>
                </div>
            </div>

            <div class="gecko-tail"></div>

            <div class="gecko-body"></div>

            <div class="gecko-head">
                <div class="left-eye"></div>
                <div class="right-eye"></div>
            </div>

        </div>
    </body>
</html>
