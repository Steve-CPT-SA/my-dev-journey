<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barad-Dur</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="scene">
        <div class="tower">
            <div class="top">
                <div class="left-spire"></div>
                <div class="eye">
                    <div class="pupil"></div>
                </div>
                <div class="right-spire"></div>
                <div class="left-spike"></div>
                <div class="right-spike"></div>
            </div>
            <div class="middle">
                <div class="left-top-spike"></div>
                <div class="left-middle-spike"></div>
                <div class="left-bottom-spike"></div>
                <div class="right-top-spike"></div>
                <div class="right-middle-spike"></div>
                <div class="right-bottom-spike"></div>
            </div>
            <div class="base">
                <div class="base-left-tower">
                    <div class="blt-spire"></div>
                    <div class="blt-middle"></div>
                    <div class="blt-bottom"></div>
                </div>
                <div class="base-right-tower">
                    <div class="brt-spire"></div>
                    <div class="brt-middle"></div>
                    <div class="brt-bottom"></div>
                </div>
            </div>
        </div>
        <div class="mount-doom">
            <div class="smoke">
                <div class="smoke-plume1"></div>
                <div class="smoke-plume2"></div>
                <div class="smoke-plume3"></div>
                <div class="smoke-plume4"></div>
            </div>
            <div class="fire">
                <div class="flame1"></div>
                <div class="flame2"></div>
                <div class="base-flame"></div>
                <div class="tephra1"></div>
                <div class="tephra2"></div>
                <div class="tephra3"></div>
            </div>
            <div class="lava">
                <div class="lava-stream1"></div>
                <div class="lava-stream2">
                    <div class="ls2-left"></div>
                    <div class="ls2-right"></div>
                </div>
                <div class="lava-stream3">
                    <div class="ls3-left"></div>
                    <div class="ls3-right">
                        <div class="ls3r-1"></div>
                        <div class="ls3r-2"></div>
                    </div>
                </div>
                <div class="lava-stream4"></div>
            </div>
            <div class="md-top"></div>
            <div class="md-middle"></div>
            <div class="md-base"></div>
        </div>
        <div class="ground"></div>
        <div class="rock-formations">
            <div class="rf-background">
                <div class="rfb-left"></div>
                <div class="rfb-center"></div>
                <div class="rfb-right"></div>
            </div>
            <div class="rf-tower-base">
                <div class="rftb-left">
                    <div class="rock1"></div>
                    <div class="rock2"></div>
                    <div class="rock3"></div>
                </div>
                <div class="rftb-right">
                    <div class="rock4"></div>
                    <div class="rock5"></div>
                    <div class="rock6"></div>
                    <div class="rock7"></div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
