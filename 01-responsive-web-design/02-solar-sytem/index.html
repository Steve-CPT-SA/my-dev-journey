<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar System</title>
</head>
<body>
    <div class="scene">
        <div class="star1"></div>
        <div class="star2"></div>
        <div class="star3"></div>
        <div class="star4"></div>
       <div class="sun" data-name="Sun"></div>
       <div class="mercury-orbit">
            <div class="mercury" data-name="Mercury"></div>
       </div>
         <div class="venus-orbit">
                <div class="venus" data-name="Venus"></div>
         </div>
        <div class="earth-orbit">
            <div class="earth" data-name="Earth"></div>
        </div>
        <div class="mars-orbit">
            <div class="mars" data-name="Mars"></div>
        </div>
        <div class="jupiter-orbit">
            <div class="jupiter" data-name="Jupiter"></div>
        </div>
        <div class="saturn-orbit">
            <div class="saturn" data-name="Saturn">
                <div class="saturn-ring"></div>
            </div>
        </div>
        <div class="uranus-orbit">
            <div class="uranus" data-name="Uranus">
                <div class="uranus-ring"></div>
            </div>
        </div>
        <div class="neptune-orbit">
            <div class="neptune" data-name="Neptune"></div>
        </div>
        <div class="pluto-orbit">
            <div class="pluto" data-name="Pluto"></div>
        </div>
    </div>
</body>
</html>
