<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barad-Dur</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="scene">
        <div class="eye">
            <div class="pupil"></div>
        </div>
        <div class="tower">
            <div class="tower-top"></div>
            <div class="tower-middle"></div>
            <div class="tower-base"></div>
        </div>>
        <div class="mount-doom">
            <div class="lava">
                <div class="lava-stream1"></div>
                <div class="lava-stream2"></div>
                <div class="lava-stream3"></div>
                <div class="lava-stream4"></div>
            </div>
        </div>
        <div class="fire">
            <div class="flame-inner"></div>
            <div class="flame-outer"></div>
        </div>
        <div class="tephra1"></div>
        <div class="tephra2"></div>
        <div class="tephra3"></div>
        <div class="tephra4"></div>
        <div class="smoke">
            <div class="smoke-plume1"></div>
            <div class="smoke-plume2"></div>
            <div class="smoke-plume3"></div>
            <div class="smoke-plume4"></div>
            <div class="smoke-plume5"></div>
            <div class="smoke-plume6"></div>
        </div>
        <div class="ground"></div>
        <div class="rock-formations">
            <div class="rf-background">
                <div class="rfb-left"></div>
                <div class="rfb-center"></div>
                <div class="rfb-right"></div>
            </div>
            <div class="rf-tower-base">
                <div class="rftb-left">
                    <div class="rock1"></div>
                    <div class="rock2"></div>
                    <div class="rock3"></div>
                </div>
                <div class="rftb-right">
                    <div class="rock4"></div>
                    <div class="rock5"></div>
                    <div class="rock6"></div>
                    <div class="rock7"></div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
