<!DOCTYPE html>
<html lang = "en">
    <head>
        <meta charset = "UTF-8">
        <meta name = "viewport" content = "width=device-width, initial-scale=1.0">
        <title>Flexbox Photo Gallery</title>
        <link rel = "stylesheet" href = "styles.css">
    </head>
    <body>

        <h1>Five Harmonies</h1>

        <section class = "gallery">    
            <figure class = "taoism picture">
                <img src = "images/taoism-balance.png" alt = "Picture showing the balance of yin and yang">
                <figcaption>Balance - <em>"The river turns upon itself, holding dark and light in equal embrace."</em></figcaption>
            </figure>

            <figure class = "taoism picture">
                <img src = "images/taoism-flowofnature.png" alt = "Picture showing the flow of nature">
                <figcaption>Flow of Nature - <em>"Emerald currents move without resistance, carrying all things forward."</em></figcaption>
            </figure>

            <figure class = "shintoism picture">
                <img src = "images/shinto-purity.png" alt = "Picture showing the concept of purity in Shintoism">
                <figcaption>Purity - <em>"The crimson gate stands untouched, a threshold between worlds."</em></figcaption>
            </figure>

            <figure class = "shintoism picture">
                <img src = "images/shinto-sacredpresence.png" alt = "Picture showing the concept of sacred presence in Shintoism">
                <figcaption>Sacred Presence - <em>"Lanterns glow softly, guiding spirits through the veil of mist."</em></figcaption>
            </figure>

            <figure class = "neo-confucianism picture">
                <img src = "images/neoconf-duty.png" alt = "Picture showing the concept of duty in Neo-Confucianism">
                <figcaption>Duty - <em>"Steps rise in order, each stone laid for the weight of responsibility."</em></figcaption>
            </figure>

            <figure class = "neo-confucianism picture">
                <img src = "images/neoconf-orderandharmony.png" alt = "Picture showing the concept of order and harmony in Neo-Confucianism">
                <figcaption>Order and Harmony - <em>"Geometry unfolds in radiant symmetry, the center holding all together."</em></figcaption>
            </figure>

            <figure class = "buddhism picture">
                <img src = "images/buddhism-compassion.png" alt = "Picture showing the concept of compassion in Buddhism">
                <figcaption>Compassion - <em>"Lotus petals open gently, offering light to every soul."</em></figcaption>
            </figure>

            <figure class = "buddhism picture">
                <img src = "images/buddhism-gentlestrength.png" alt = "Picture showing the concept of gentle strength in Buddhism">
                <figcaption>Gentle Strength - <em>"The Dharma Wheel turns in silence, its golden spokes steady and kind."</em></figcaption>
            </figure>

            <figure class = "zen picture">
                <img src = "images/zen-emptiness.png" alt = "Picture showing the concept of emptiness in Zen">
                <figcaption>Emptiness - <em>"A horizon drawn in ink, the rest left to silence."</em></figcaption>
            </figure>

            <figure class = "zen picture">
                <img src = "images/zen-silentclarity.png" alt = "Picture showing the concept of silent clarity in Zen">
                <figcaption>Silent Clarity - <em>"One figure, one breath - the world revealed in stillness."</em></figcaption>
            </figure>
        </section>
    </body>
</html>
