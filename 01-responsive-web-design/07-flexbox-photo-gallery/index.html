<!DOCTYPE html>
<html lang = "en">
    <head>
        <meta charset = "UTF-8">
        <meta name = "viewport" content = "width=device-width, initial-scale=1.0">
        <title>Flexbox Photo Gallery</title>
        <link rel = "stylesheet" href = "styles.css">
    </head>
    <body>

        <h1>Flexbox Photo Gallery</h1>

        <section class = "gallery">    
            <figure class = "taoism picture">
                <img src = "images/taoism-balance.png" alt = "Picture showing the balance of yin and yang">
                <figcaption>Photo 1</figcaption>
            </figure>

            <figure class = "taoism picture">
                <img src = "images/taoism-flowofnature.png" alt = "Picture showing the flow of nature">
                <figcaption>Photo 2</figcaption>
            </figure>

            <figure class = "shintoism picture">
                <img src = "images/shinto-purity.png" alt = "Picture showing the concept of purity in Shintoism">
                <figcaption>Photo 3</figcaption>
            </figure>

            <figure class = "shintoism picture">
                <img src = "images/shinto-sacredpresence.png" alt = "Picture showing the concept of sacred presence in Shintoism">
                <figcaption>Photo 4</figcaption>
            </figure>

            <figure class = "neo-confucianism picture">
                <img src = "images/neoconf-duty.png" alt = "Picture showing the concept of duty in Neo-Confucianism">
                <figcaption>Photo 5</figcaption>
            </figure>

            <figure class = "neo-confucianism picture">
                <img src = "images/neoconf-orderandharmony.png" alt = "Picture showing the concept of order and harmony in Neo-Confucianism">
                <figcaption>Photo 6</figcaption>
            </figure>

            <figure class = "buddhism picture">
                <img src = "images/buddhism-compassion.png" alt = "Picture showing the concept of compassion in Buddhism">
                <figcaption>Photo 7</figcaption>
            </figure>

            <figure class = "buddhism picture">
                <img src = "images/buddhism-gentlestrength.png" alt = "Picture showing the concept of gentle strength in Buddhism">
                <figcaption>Photo 8</figcaption>
            </figure>

            <figure class = "zen picture">
                <img src = "images/zen-emptiness.png" alt = "Picture showing the concept of emptiness in Zen">
                <figcaption>Photo 9</figcaption>
            </figure>

            <figure class = "zen picture">
                <img src = "images/zen-silentclarity.png" alt = "Picture showing the concept of silent clarity in Zen">
                <figcaption>Photo 10</figcaption>
            </figure>
        </section>
    </body>
</html>
